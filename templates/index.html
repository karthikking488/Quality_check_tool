<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snowflake Query Tool</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: #f8f9fa;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f1f3f5;
            --text-primary: #212529;
            --text-secondary: #6c757d;
            --border-color: #dee2e6;
            --shadow: rgba(0, 0, 0, 0.1);
            --shadow-hover: rgba(0, 0, 0, 0.15);
            --accent-primary: #ff6b35;
            --accent-secondary: #ff8c42;
            --accent-gradient: linear-gradient(135deg, #ff6b35 0%, #ff8c42 100%);
            --accent-light: #fff3ef;
            --accent-dark: #e85d2e;
            --success: #28a745;
            --success-bg: #d4edda;
            --error: #dc3545;
            --error-bg: #f8d7da;
            --info: #17a2b8;
            --info-bg: #d1ecf1;
        }

        [data-theme="dark"] {
            --bg-primary: #1a1d23;
            --bg-secondary: #22252b;
            --bg-tertiary: #2a2d35;
            --text-primary: #e9ecef;
            --text-secondary: #adb5bd;
            --border-color: #3a3d45;
            --shadow: rgba(0, 0, 0, 0.3);
            --shadow-hover: rgba(0, 0, 0, 0.5);
            --accent-light: #3a2d29;
            --success-bg: #1e3a2a;
            --error-bg: #3a1e23;
            --info-bg: #1e2f35;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: var(--bg-secondary);
            border-radius: 16px;
            box-shadow: 0 8px 32px var(--shadow);
            overflow: hidden;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            background: var(--accent-gradient);
            color: white;
            padding: 24px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 12px rgba(255, 107, 53, 0.2);
        }

        .header-title {
            font-size: 28px;
            font-weight: 600;
        }

        .nav-links {
            display: flex;
            gap: 15px;
        }

        .nav-link {
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.15);
            transition: all 0.3s ease;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
        }

        .nav-link.active {
            background: rgba(255, 255, 255, 0.3);
            font-weight: 600;
        }

        .content {
            padding: 32px;
        }

        .sample-queries {
            background: var(--bg-tertiary);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 24px;
            border: 1px solid var(--border-color);
        }

        .sample-queries h3 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sample-query {
            display: inline-block;
            background: var(--bg-secondary);
            padding: 10px 18px;
            margin: 6px 6px 6px 0;
            border-radius: 24px;
            cursor: pointer;
            font-size: 13px;
            border: 2px solid var(--border-color);
            color: var(--text-primary);
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .sample-query:hover {
            background: var(--accent-gradient);
            color: white;
            border-color: var(--accent-primary);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 107, 53, 0.3);
        }

        .query-section {
            margin-bottom: 24px;
        }

        .query-label {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .query-input {
            width: 100%;
            min-height: 180px;
            padding: 16px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 14px;
            resize: vertical;
            transition: all 0.3s ease;
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .query-input:focus {
            outline: none;
            border-color: var(--accent-primary);
            background: var(--bg-secondary);
            box-shadow: 0 0 0 4px rgba(255, 107, 53, 0.1);
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
        }

        .btn-execute {
            background: var(--accent-gradient);
            color: white;
            flex: 1;
            box-shadow: 0 4px 12px rgba(255, 107, 53, 0.3);
        }

        .btn-execute:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 53, 0.4);
        }

        .btn-execute:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-execute:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-clear {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 2px solid var(--border-color);
            padding: 14px 24px;
        }

        .btn-clear:hover {
            background: var(--error);
            color: white;
            border-color: var(--error);
            transform: translateY(-2px);
        }

        .status {
            padding: 14px 20px;
            border-radius: 10px;
            margin-bottom: 24px;
            display: none;
            font-size: 14px;
            font-weight: 500;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .status.success {
            background: var(--success-bg);
            color: var(--success);
            border-left: 4px solid var(--success);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status.error {
            background: var(--error-bg);
            color: var(--error);
            border-left: 4px solid var(--error);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status.loading {
            background: var(--info-bg);
            color: var(--info);
            border-left: 4px solid var(--info);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .results-section {
            margin-top: 32px;
            animation: fadeIn 0.5s ease;
        }

        .results-header {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--accent-primary);
        }

        .row-count {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 500;
            background: var(--accent-light);
            padding: 6px 14px;
            border-radius: 20px;
        }

        .table-container {
            overflow-x: auto;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            max-height: 600px;
            overflow-y: auto;
            box-shadow: 0 4px 12px var(--shadow);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--bg-secondary);
        }

        thead {
            background: var(--accent-gradient);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        th {
            padding: 16px;
            text-align: left;
            font-weight: 600;
            color: white;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
            font-size: 14px;
        }

        tbody tr {
            transition: all 0.2s ease;
        }

        tbody tr:hover {
            background: var(--accent-light);
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
            color: var(--accent-primary);
        }

        .empty-state p {
            font-size: 16px;
            font-weight: 500;
        }

        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255, 107, 53, 0.3);
            border-top: 3px solid var(--accent-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 16px;
            }

            .nav-links {
                flex-direction: column;
                width: 100%;
            }

            .nav-link {
                width: 100%;
                justify-content: center;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="header-title">❄️ Snowflake Query Tool</h1>
            <div style="display: flex; align-items: center; gap: 20px;">
                <div class="nav-links">
                    <a href="/" class="nav-link active"><i class="fas fa-database"></i> SQL Query</a>
                    <a href="/ai-query" class="nav-link"><i class="fas fa-robot"></i> AI Query Assistant</a>
                    <a href="/unit-test-generator" class="nav-link"><i class="fas fa-vial"></i> AI Test Generator</a>
                </div>
                <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme" style="background: rgba(255,255,255,0.2); border: none; padding: 0.75rem 1rem; border-radius: 50px; cursor: pointer; color: white; font-size: 1.2rem; transition: all 0.3s ease; backdrop-filter: blur(10px);">
                    <i class="fas fa-moon" id="themeIcon"></i>
                </button>
            </div>
        </div>
        
        <div class="content">
            <div class="sample-queries">
                <h3><i class="fas fa-lightbulb"></i> Quick Start - Sample Queries</h3>
                <span class="sample-query" onclick="setSampleQuery('SELECT * FROM YOUR_TABLE LIMIT 10')"><i class="fas fa-table"></i> SELECT * FROM TABLE</span>
                <span class="sample-query" onclick="setSampleQuery('SELECT COUNT(*) as total_rows FROM YOUR_TABLE')"><i class="fas fa-calculator"></i> COUNT ROWS</span>
                <span class="sample-query" onclick="setSampleQuery('SHOW TABLES')"><i class="fas fa-list"></i> SHOW TABLES</span>
                <span class="sample-query" onclick="setSampleQuery('DESCRIBE TABLE YOUR_TABLE')"><i class="fas fa-info-circle"></i> DESCRIBE TABLE</span>
            </div>

            <div class="query-section">
                <label class="query-label"><i class="fas fa-code"></i> Enter Your SQL Query:</label>
                <textarea id="queryInput" class="query-input" placeholder="Type your SQL query here...\n\nExample:\nSELECT * FROM MY_TABLE LIMIT 10"></textarea>
            </div>

            <div class="button-group">
                <button class="btn btn-execute" onclick="executeQuery()">
                    <i class="fas fa-play"></i> Execute Query
                </button>
                <button class="btn btn-clear" onclick="clearQuery()">
                    <i class="fas fa-eraser"></i> Clear
                </button>
            </div>

            <div id="status" class="status"></div>

            <div class="results-section" id="resultsSection" style="display: none;">
                <div class="results-header">
                    <span><i class="fas fa-table"></i> Query Results</span>
                    <span class="row-count" id="rowCount"></span>
                </div>
                <div class="table-container">
                    <table id="resultsTable">
                        <thead id="tableHead"></thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>

            <div class="empty-state" id="emptyState">
                <i class="fas fa-database"></i>
                <p>Enter a SQL query above and click "Execute Query" to see results</p>
            </div>
        </div>
    </div>

    <script>
        // Check if user is connected on page load
        window.onload = async function() {
            try {
                const connResponse = await fetch('/api/check-connection');
                const connResult = await connResponse.json();
                if (!connResult.connected) {
                    // Not connected, redirect to home page for SSO login
                    window.location.href = '/';
                    return;
                }
            } catch (e) {
                // Error checking connection, redirect to home
                window.location.href = '/';
                return;
            }
        };
        
        function setSampleQuery(query) {
            document.getElementById('queryInput').value = query;
        }

        function clearQuery() {
            document.getElementById('queryInput').value = '';
            document.getElementById('status').style.display = 'none';
            document.getElementById('resultsSection').style.display = 'none';
            document.getElementById('emptyState').style.display = 'block';
        }

        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.className = `status ${type}`;
            statusDiv.innerHTML = type === 'loading' 
                ? `<span class="loading-spinner"></span>${message}`
                : message;
        }

        async function executeQuery() {
            const query = document.getElementById('queryInput').value.trim();
            
            if (!query) {
                showStatus('Please enter a SQL query', 'error');
                return;
            }

            const executeBtn = document.querySelector('.btn-execute');
            executeBtn.disabled = true;
            executeBtn.textContent = 'Executing...';
            
            showStatus('Executing query...', 'loading');
            document.getElementById('resultsSection').style.display = 'none';
            document.getElementById('emptyState').style.display = 'none';

            try {
                const response = await fetch('/execute', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ query: query })
                });

                const result = await response.json();

                if (result.error) {
                    showStatus(`Error: ${result.error}`, 'error');
                    document.getElementById('emptyState').style.display = 'block';
                } else {
                    displayResults(result);
                    showStatus(`Query executed successfully! Retrieved ${result.row_count} row(s).`, 'success');
                }
            } catch (error) {
                showStatus(`Error: ${error.message}`, 'error');
                document.getElementById('emptyState').style.display = 'block';
            } finally {
                executeBtn.disabled = false;
                executeBtn.textContent = '▶ Execute Query';
            }
        }

        function displayResults(result) {
            const resultsSection = document.getElementById('resultsSection');
            const tableHead = document.getElementById('tableHead');
            const tableBody = document.getElementById('tableBody');
            const rowCount = document.getElementById('rowCount');

            // Clear previous results
            tableHead.innerHTML = '';
            tableBody.innerHTML = '';

            if (result.data.length === 0) {
                document.getElementById('emptyState').innerHTML = '<p>Query executed successfully but returned no results.</p>';
                document.getElementById('emptyState').style.display = 'block';
                return;
            }

            // Create table header
            const headerRow = document.createElement('tr');
            result.columns.forEach(column => {
                const th = document.createElement('th');
                th.textContent = column;
                headerRow.appendChild(th);
            });
            tableHead.appendChild(headerRow);

            // Create table rows
            result.data.forEach(row => {
                const tr = document.createElement('tr');
                result.columns.forEach(column => {
                    const td = document.createElement('td');
                    const value = row[column];
                    td.textContent = value !== null && value !== undefined ? value : 'NULL';
                    if (value === null || value === undefined) {
                        td.style.color = '#999';
                        td.style.fontStyle = 'italic';
                    }
                    tr.appendChild(td);
                });
                tableBody.appendChild(tr);
            });

            rowCount.textContent = `${result.row_count} row(s)`;
            resultsSection.style.display = 'block';
            document.getElementById('emptyState').style.display = 'none';
        }

        // Allow Ctrl+Enter to execute query
        document.getElementById('queryInput').addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') {
                executeQuery();
            }
        });
    </script>
    <script>
        // THEME TOGGLE FEATURE
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            const icon = document.getElementById('themeIcon');
            icon.className = newTheme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
        }

        // Load saved theme on page load
        document.addEventListener('DOMContentLoaded', function() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            const icon = document.getElementById('themeIcon');
            icon.className = savedTheme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
        });
    </script>
</body>
</html>
