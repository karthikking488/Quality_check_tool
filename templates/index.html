<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snowflake Query Tool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .header {
            background: #29b5e8;
            color: white;
            padding: 25px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title {
            font-size: 28px;
            font-weight: 600;
        }

        .nav-links {
            display: flex;
            gap: 15px;
        }

        .nav-link {
            color: white;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.2);
            transition: all 0.3s;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .content {
            padding: 30px;
        }

        .query-section {
            margin-bottom: 25px;
        }

        .query-label {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            display: block;
        }

        .query-input {
            width: 100%;
            min-height: 150px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            resize: vertical;
            transition: border-color 0.3s;
        }

        .query-input:focus {
            outline: none;
            border-color: #29b5e8;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-execute {
            background: #29b5e8;
            color: white;
            flex: 1;
        }

        .btn-execute:hover {
            background: #1e8cbd;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(41, 181, 232, 0.4);
        }

        .btn-execute:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .btn-clear {
            background: #f44336;
            color: white;
            padding: 12px 25px;
        }

        .btn-clear:hover {
            background: #d32f2f;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(244, 67, 54, 0.4);
        }

        .status {
            padding: 12px 20px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .status.loading {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }

        .results-section {
            margin-top: 30px;
        }

        .results-header {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .row-count {
            font-size: 14px;
            color: #666;
            font-weight: normal;
        }

        .table-container {
            overflow-x: auto;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            max-height: 600px;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        thead {
            background: #f5f5f5;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        th {
            padding: 14px 16px;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #29b5e8;
            white-space: nowrap;
            font-size: 14px;
        }

        td {
            padding: 12px 16px;
            border-bottom: 1px solid #f0f0f0;
            color: #555;
            font-size: 13px;
        }

        tbody tr:hover {
            background: #f9f9f9;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #29b5e8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .sample-queries {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .sample-queries h3 {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }

        .sample-query {
            display: inline-block;
            background: white;
            padding: 8px 15px;
            margin: 5px 5px 5px 0;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            border: 1px solid #e0e0e0;
            transition: all 0.2s;
        }

        .sample-query:hover {
            background: #29b5e8;
            color: white;
            border-color: #29b5e8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="header-title">❄️ Snowflake Query Tool</h1>
            <div class="nav-links">
                <a href="/" class="nav-link">🏠 Home</a>
                <a href="/query-tool" class="nav-link" style="background: rgba(255, 255, 255, 0.3);">SQL Query Tool</a>
                <a href="/ai-query" class="nav-link">🤖 AI Query Assistant</a>
                <a href="/unit-test-generator" class="nav-link">AI Test Generator</a>
            </div>
        </div>
        
        <div class="content">
            <div class="sample-queries">
                <h3>Sample Queries (Click to use):</h3>
                <span class="sample-query" onclick="setSampleQuery('SELECT * FROM YOUR_TABLE LIMIT 10')">SELECT * FROM TABLE</span>
                <span class="sample-query" onclick="setSampleQuery('SELECT COUNT(*) as total_rows FROM YOUR_TABLE')">COUNT ROWS</span>
                <span class="sample-query" onclick="setSampleQuery('SHOW TABLES')">SHOW TABLES</span>
                <span class="sample-query" onclick="setSampleQuery('DESCRIBE TABLE YOUR_TABLE')">DESCRIBE TABLE</span>
            </div>

            <div class="query-section">
                <label class="query-label">Enter Your SQL Query:</label>
                <textarea id="queryInput" class="query-input" placeholder="Type your SQL query here...&#10;&#10;Example:&#10;SELECT * FROM MY_TABLE LIMIT 10"></textarea>
            </div>

            <div class="button-group">
                <button class="btn btn-execute" onclick="executeQuery()">
                    ▶ Execute Query
                </button>
                <button class="btn btn-clear" onclick="clearQuery()">
                    Clear
                </button>
            </div>

            <div id="status" class="status"></div>

            <div class="results-section" id="resultsSection" style="display: none;">
                <div class="results-header">
                    <span>Query Results</span>
                    <span class="row-count" id="rowCount"></span>
                </div>
                <div class="table-container">
                    <table id="resultsTable">
                        <thead id="tableHead"></thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>

            <div class="empty-state" id="emptyState">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
                <p>Enter a SQL query above and click "Execute Query" to see results</p>
            </div>
        </div>
    </div>

    <script>
        // Check if user is connected on page load
        window.onload = async function() {
            try {
                const connResponse = await fetch('/api/check-connection');
                const connResult = await connResponse.json();
                if (!connResult.connected) {
                    // Not connected, redirect to home page for SSO login
                    window.location.href = '/';
                    return;
                }
            } catch (e) {
                // Error checking connection, redirect to home
                window.location.href = '/';
                return;
            }
        };
        
        function setSampleQuery(query) {
            document.getElementById('queryInput').value = query;
        }

        function clearQuery() {
            document.getElementById('queryInput').value = '';
            document.getElementById('status').style.display = 'none';
            document.getElementById('resultsSection').style.display = 'none';
            document.getElementById('emptyState').style.display = 'block';
        }

        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.className = `status ${type}`;
            statusDiv.innerHTML = type === 'loading' 
                ? `<span class="loading-spinner"></span>${message}`
                : message;
        }

        async function executeQuery() {
            const query = document.getElementById('queryInput').value.trim();
            
            if (!query) {
                showStatus('Please enter a SQL query', 'error');
                return;
            }

            const executeBtn = document.querySelector('.btn-execute');
            executeBtn.disabled = true;
            executeBtn.textContent = 'Executing...';
            
            showStatus('Executing query...', 'loading');
            document.getElementById('resultsSection').style.display = 'none';
            document.getElementById('emptyState').style.display = 'none';

            try {
                const response = await fetch('/execute', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ query: query })
                });

                const result = await response.json();

                if (result.error) {
                    showStatus(`Error: ${result.error}`, 'error');
                    document.getElementById('emptyState').style.display = 'block';
                } else {
                    displayResults(result);
                    showStatus(`Query executed successfully! Retrieved ${result.row_count} row(s).`, 'success');
                }
            } catch (error) {
                showStatus(`Error: ${error.message}`, 'error');
                document.getElementById('emptyState').style.display = 'block';
            } finally {
                executeBtn.disabled = false;
                executeBtn.textContent = '▶ Execute Query';
            }
        }

        function displayResults(result) {
            const resultsSection = document.getElementById('resultsSection');
            const tableHead = document.getElementById('tableHead');
            const tableBody = document.getElementById('tableBody');
            const rowCount = document.getElementById('rowCount');

            // Clear previous results
            tableHead.innerHTML = '';
            tableBody.innerHTML = '';

            if (result.data.length === 0) {
                document.getElementById('emptyState').innerHTML = '<p>Query executed successfully but returned no results.</p>';
                document.getElementById('emptyState').style.display = 'block';
                return;
            }

            // Create table header
            const headerRow = document.createElement('tr');
            result.columns.forEach(column => {
                const th = document.createElement('th');
                th.textContent = column;
                headerRow.appendChild(th);
            });
            tableHead.appendChild(headerRow);

            // Create table rows
            result.data.forEach(row => {
                const tr = document.createElement('tr');
                result.columns.forEach(column => {
                    const td = document.createElement('td');
                    const value = row[column];
                    td.textContent = value !== null && value !== undefined ? value : 'NULL';
                    if (value === null || value === undefined) {
                        td.style.color = '#999';
                        td.style.fontStyle = 'italic';
                    }
                    tr.appendChild(td);
                });
                tableBody.appendChild(tr);
            });

            rowCount.textContent = `${result.row_count} row(s)`;
            resultsSection.style.display = 'block';
            document.getElementById('emptyState').style.display = 'none';
        }

        // Allow Ctrl+Enter to execute query
        document.getElementById('queryInput').addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') {
                executeQuery();
            }
        });
    </script>
</body>
</html>
